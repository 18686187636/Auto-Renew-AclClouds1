name: Auto-Renew-ACL

on:
  workflow_dispatch:
  schedule:
    - cron: '0 23 */3 * *'   # 每隔3天 UTC 23:00 运行

jobs:
  Renew-acl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      actions: write

    steps:
      - name: 📥 下载代码
        uses: actions/checkout@v6

      - name: 🐍 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            x11-utils \
            xdotool \
            scrot \
            fonts-noto-cjk \
            jq \
            wget \
            curl

      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase aiohttp requests
          seleniumbase install chromedriver

      # ================= 代理配置（手动 sing-box，含重试机制）=================
      - name: 🌐 下载并启动 sing-box 代理
        env:
          NODE_LINK: ${{ secrets.NODE_LINK }}
        run: |
          set -e

          # 1. 下载 sing-box 静态二进制（Linux amd64）—— 带重试和备用源
          echo "📦 下载 sing-box 最新版本..."
          DOWNLOAD_SUCCESS=false
          MAX_RETRIES=5
          RETRY_DELAY=3

          # 方案 A：直接从 latest 重定向下载（带重试）
          for ((i=1; i<=MAX_RETRIES; i++)); do
            echo "尝试 $i/$MAX_RETRIES: 使用 latest 重定向下载..."
            if curl -L --fail --retry 2 --retry-delay 2 -o sing-box.tar.gz \
              https://github.com/SagerNet/sing-box/releases/latest/download/sing-box-linux-amd64.tar.gz; then
              if [ -s sing-box.tar.gz ]; then
                DOWNLOAD_SUCCESS=true
                echo "✅ 直接下载成功"
                break
              fi
            fi
            sleep $RETRY_DELAY
          done

          # 方案 B：如果直接下载失败，尝试 GitHub API 获取具体版本号（带重试）
          if [ "$DOWNLOAD_SUCCESS" != "true" ]; then
            echo "⚠️ 直接下载失败，尝试通过 GitHub API 获取最新版本..."
            for ((i=1; i<=MAX_RETRIES; i++)); do
              echo "尝试 $i/$MAX_RETRIES: 通过 API 获取下载链接..."
              LATEST_URL=$(curl -s -H "User-Agent: GitHub-Action" \
                https://api.github.com/repos/SagerNet/sing-box/releases/latest \
                | jq -r '.assets[] | select(.name | test("linux-amd64")) | .browser_download_url')
              if [ -n "$LATEST_URL" ]; then
                if curl -L --fail --retry 2 --retry-delay 2 -o sing-box.tar.gz "$LATEST_URL"; then
                  if [ -s sing-box.tar.gz ]; then
                    DOWNLOAD_SUCCESS=true
                    echo "✅ API 下载成功"
                    break
                  fi
                fi
              fi
              sleep $RETRY_DELAY
            done
          fi

          # 方案 C：若上述均失败，尝试使用固定版本号（如 v1.13.14）
          if [ "$DOWNLOAD_SUCCESS" != "true" ]; then
            echo "⚠️ 使用固定版本 v1.13.14 作为备用..."
            FALLBACK_URL="https://github.com/SagerNet/sing-box/releases/download/v1.13.14/sing-box-linux-amd64.tar.gz"
            if curl -L --fail -o sing-box.tar.gz "$FALLBACK_URL" && [ -s sing-box.tar.gz ]; then
              DOWNLOAD_SUCCESS=true
              echo "✅ 备用版本下载成功"
            fi
          fi

          # 最终检查
          if [ "$DOWNLOAD_SUCCESS" != "true" ]; then
            echo "❌ 所有下载方式均失败，请检查网络或手动指定版本。"
            exit 1
          fi

          # 解压并安装
          tar -xzf sing-box.tar.gz
          sudo mv sing-box-*/sing-box /usr/local/bin/
          sing-box version

          # 2. 用 Python 解析 NODE_LINK 并生成 sing-box 配置文件
          echo "🔧 生成 sing-box 配置..."
          python3 << 'EOF'
          import urllib.parse, json, sys, os

          link = os.environ.get('NODE_LINK', '').strip()
          if not link:
              print("❌ NODE_LINK 环境变量为空", file=sys.stderr)
              sys.exit(1)

          if '://' not in link:
              print(f"❌ 无效的链接格式: {link}", file=sys.stderr)
              sys.exit(1)
          proto, rest = link.split('://', 1)

          rest = rest.split('#', 1)[0]

          if '@' in rest:
              auth, rest = rest.split('@', 1)
          else:
              auth = ""

          if '?' in rest:
              host_port, params_str = rest.split('?', 1)
          else:
              host_port, params_str = rest, ""

          host = ""
          port = ""
          if host_port.startswith('[') and ']' in host_port:
              host = host_port.split(']', 1)[0][1:]
              remaining = host_port.split(']', 1)[1]
              if remaining.startswith(':'):
                  port = remaining[1:]
              else:
                  port = "54552"
          else:
              if ':' in host_port:
                  host, port = host_port.split(':', 1)
              else:
                  host = host_port
                  port = "443"

          if not host or not port:
              print(f"❌ 无法解析主机或端口: host='{host}', port='{port}'", file=sys.stderr)
              sys.exit(1)

          params = dict(urllib.parse.parse_qsl(params_str))

          outbound = {
              "type": "hysteria2",
              "tag": "proxy",
              "server": host,
              "server_port": int(port),
              "up_mbps": 100,
              "down_mbps": 100,
              "password": auth,
          }

          tls = {"enabled": True}
          sni = params.get("sni", "")
          if sni:
              tls["server_name"] = sni
          insecure_val = params.get("insecure", "0") or params.get("allowInsecure", "0")
          if insecure_val in ("1", "true"):
              tls["insecure"] = True
          pin = params.get("pinSHA256", "")
          if pin:
              pin = urllib.parse.unquote(pin)
              tls["pin_sha256"] = pin

          outbound["tls"] = tls

          config = {
              "log": {"level": "info"},
              "inbounds": [
                  {
                      "type": "socks",
                      "tag": "socks-in",
                      "listen": "127.0.0.1",
                      "listen_port": 1080,
                      "sniff": True,
                      "sniff_override_destination": True,
                  }
              ],
              "outbounds": [outbound],
          }

          with open("sing-box-config.json", "w") as f:
              json.dump(config, f, indent=2)

          print("✅ sing-box 配置文件生成成功")
          EOF

          # 3. 检查配置文件是否合法
          echo "🔍 验证配置..."
          if ! sing-box check -c sing-box-config.json; then
              echo "❌ sing-box 配置校验失败，内容如下："
              cat sing-box-config.json
              exit 1
          fi

          # 4. 后台启动 sing-box
          echo "🚀 启动 sing-box 代理..."
          nohup sing-box run -c sing-box-config.json > sing-box.log 2>&1 &
          for i in {1..10}; do
            if ss -lnt | grep -q ":1080"; then
              echo "✅ 代理已启动（SOCKS5 127.0.0.1:1080）"
              break
            fi
            sleep 1
          done
          if ! ss -lnt | grep -q ":1080"; then
            echo "❌ 代理启动失败，查看日志："
            cat sing-box.log
            exit 1
          fi

          # 5. 设置环境变量供后续步骤使用
          echo "IS_PROXY=true" >> $GITHUB_ENV
          echo "PROXY_SERVER=socks5://127.0.0.1:1080" >> $GITHUB_ENV

          echo "📍 代理出口 IP："
          curl --socks5 127.0.0.1:1080 -s https://api.ip.sb/ip || echo "获取 IP 失败"
      # ================= 代理配置结束 =================

      - name: 🚀 运行续期脚本
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1366x768x24" \
            python3 app.py

      - name: 🧹 清理旧的工作流运行记录
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 1 ]; then
              echo "删除运行记录: $run_id"
              gh run delete $run_id || true
            fi
          done
