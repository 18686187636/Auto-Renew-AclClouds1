name: Auto-Renew-ACL

on:
  workflow_dispatch:
  schedule:
    - cron: '0 23 */3 * *'   # 每隔3天 UTC 23:00 运行

jobs:
  Renew-acl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      actions: write

    steps:
      - name: 📥 下载代码
        uses: actions/checkout@v6

      - name: 🐍 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb x11-utils xdotool scrot fonts-noto-cjk \
            jq wget curl

      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase aiohttp requests
          seleniumbase install chromedriver

      # ========== 代理配置（IPv6 优化版） ==========
      - name: 🌐 下载并启动 sing-box 代理（IPv6 优化）
        env:
          NODE_LINK: ${{ secrets.NODE_LINK }}
        run: |
          set -e

          echo "📦 下载 sing-box v1.13.14 ..."
          VERSION="1.13.14"
          URL="https://github.com/SagerNet/sing-box/releases/download/v${VERSION}/sing-box-${VERSION}-linux-amd64.tar.gz"
          for i in {1..3}; do
            echo "尝试 $i/3"
            if wget -q --show-progress -O sing-box.tar.gz "$URL" && [ -s sing-box.tar.gz ]; then
              echo "✅ 下载成功"; break
            fi
            sleep 2
          done
          [ -s sing-box.tar.gz ] || { echo "❌ 下载失败"; exit 1; }

          tar -xzf sing-box.tar.gz
          sudo mv sing-box-*/sing-box /usr/local/bin/
          sing-box version

          echo "🔧 生成 sing-box 配置（IPv6 优先）..."
          python3 << 'EOF'
          import urllib.parse, json, sys, os

          link = os.environ.get('NODE_LINK', '').strip()
          if not link:
              print("❌ NODE_LINK 为空", file=sys.stderr)
              sys.exit(1)

          proto, rest = link.split('://', 1)
          rest = rest.split('#', 1)[0]

          if '@' in rest:
              auth, rest = rest.split('@', 1)
          else:
              auth = ""

          if '?' in rest:
              host_port, params_str = rest.split('?', 1)
          else:
              host_port, params_str = rest, ""

          # 解析 host 和 port（支持 IPv6 方括号）
          host = ""
          port = ""
          if host_port.startswith('[') and ']' in host_port:
              host = host_port.split(']', 1)[0][1:]
              remaining = host_port.split(']', 1)[1]
              port = remaining[1:] if remaining.startswith(':') else "54552"
          else:
              if ':' in host_port:
                  host, port = host_port.split(':', 1)
              else:
                  host, port = host_port, "443"

          if not host or not port:
              print(f"❌ 解析失败: host='{host}', port='{port}'", file=sys.stderr)
              sys.exit(1)

          params = dict(urllib.parse.parse_qsl(params_str))

          # ----- outbound（hysteria2，IPv6 优先） -----
          outbound = {
              "type": "hysteria2",
              "tag": "proxy",
              "server": host,
              "server_port": int(port),
              "up_mbps": 100,
              "down_mbps": 100,
              "password": auth,
              "domain_strategy": "prefer_ipv6",   # 域名解析优先 IPv6
          }

          # TLS 配置
          tls = {"enabled": True}
          sni = params.get("sni", "")
          if sni:
              tls["server_name"] = sni
          insecure_val = params.get("insecure", "0") or params.get("allowInsecure", "0")
          if insecure_val in ("1", "true"):
              tls["insecure"] = True
          outbound["tls"] = tls

          # ----- DNS outbound（Google IPv6 DNS） -----
          dns_outbound = {
              "type": "dns",
              "tag": "dns-out",
              "server": "2001:4860:4860::8888",
              "server_port": 53,
              "strategy": "prefer_ipv6"
          }

          # ----- 完整配置（含路由） -----
          config = {
              "log": {"level": "info"},
              "inbounds": [
                  {
                      "type": "socks",
                      "tag": "socks-in",
                      "listen": "127.0.0.1",
                      "listen_port": 1080,
                  }
              ],
              "outbounds": [outbound, dns_outbound],
              "route": {
                  "rules": [
                      {
                          "protocol": ["dns"],
                          "outbound": "dns-out"
                      }
                  ],
                  "final": "proxy"
              }
          }

          with open("sing-box-config.json", "w") as f:
              json.dump(config, f, indent=2)

          print("✅ 配置生成成功（IPv6 优化）")
          EOF

          echo "🔍 验证配置..."
          if ! sing-box check -c sing-box-config.json; then
              echo "❌ 校验失败，配置内容："
              cat sing-box-config.json
              exit 1
          fi

          echo "🚀 启动代理..."
          nohup sing-box run -c sing-box-config.json > sing-box.log 2>&1 &
          for i in {1..10}; do
            if ss -lnt | grep -q ":1080"; then
              echo "✅ 代理已启动 (SOCKS5 127.0.0.1:1080)"
              break
            fi
            sleep 1
          done
          if ! ss -lnt | grep -q ":1080"; then
            echo "❌ 代理启动失败，查看日志："
            cat sing-box.log
            exit 1
          fi

          # 输出日志前 30 行便于调试
          echo "📋 sing-box 日志（前 30 行）："
          head -n 30 sing-box.log

          # 写入环境变量供后续步骤使用
          echo "IS_PROXY=true" >> $GITHUB_ENV
          echo "PROXY_SERVER=socks5://127.0.0.1:1080" >> $GITHUB_ENV

          # 测试出口 IP（允许失败，不影响后续）
          echo "📍 代理出口 IP（IPv6 优先）："
          curl --socks5 127.0.0.1:1080 -s https://api.ip.sb/ip || echo "⚠️ 获取 IP 失败，但续期可能仍然可用"
      # ========== 代理配置结束 ==========

      - name: 🚀 运行续期脚本
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          # IS_PROXY 和 PROXY_SERVER 已由上一步通过 $GITHUB_ENV 设置
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1366x768x24" \
            python3 app.py

      - name: 🧹 清理旧的工作流运行记录
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 1 ]; then
              echo "删除运行记录: $run_id"
              gh run delete $run_id || true
            fi
          done
